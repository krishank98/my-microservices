apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-init-script
data:
  init.js: |
    db = db.getSiblingDB("demo");

    db.createUser({
      user: "appuser",
      pwd: "apppassword",
      roles: [{ role: "readWrite", db: "demo" }]
    });

    db.users.insertMany([
      { type: "fullname", value: "Krishan Sorout" },
      { type: "location", value: "Bangalore" },
      { type: "marital", value: "Single" }
    ]);

    print("Database initialized");