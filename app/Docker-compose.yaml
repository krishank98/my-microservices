services:

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    command: ["--auth"]
    volumes:
      - mongo_data:/data/db
      - ./mongodb-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 5s
      retries: 5

  fullname-api:
    build: ./backend/fullname-python-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MONGO_URI: mongodb://appuser:apppassword@mongodb:27017/demo
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  location-api:
    build: ./backend/location-node-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      REDIS_URL: redis://redis:6379
      MONGO_URI: mongodb://appuser:apppassword@mongodb:27017/demo
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  marital-api:
    build: ./backend/marital-java-api
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_MONGODB_URI: mongodb://appuser:apppassword@mongodb:27017/demo
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  frontend:
    build: ./react-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - fullname-api
      - location-api
      - marital-api

volumes:
  redis_data:
  mongo_data: