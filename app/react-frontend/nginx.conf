server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    location /fullname {
        proxy_pass http://fullname-api:3000/fullname;
    }

    location /location {
        proxy_pass http://location-api:3001/location;
    }

    location /marital-status {
        proxy_pass http://marital-api:3002/marital-status;
    }
}