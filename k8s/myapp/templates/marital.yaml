apiVersion: apps/v1
kind: Deployment
metadata:
  name: marital-api
  namespace: my-micro-dev
  labels:
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marital-api
  template:
    metadata:
      labels:
        app: marital-api
        tier: backend
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: marital-api
          image: "{{ .Values.marital.image }}:{{ .Values.marital.tag }}"
          imagePullPolicy: {{ .Values.marital.pullPolicy }}

          ports:
            - containerPort: 3002

          readinessProbe:
            httpGet:
              path: /marital-status
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /marital-status
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          env:
            - name: REDIS_URL
              value: redis://redis:6379
            - name: MONGO_URI
              value: mongodb://appuser:apppassword@mongodb:27017/demo
---
apiVersion: v1
kind: Service
metadata:
  name: marital-api
  namespace: my-micro-dev
  labels:
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: marital-api
  ports:
    - port: 3002
      targetPort: 3002