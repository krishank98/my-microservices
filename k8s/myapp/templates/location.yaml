apiVersion: apps/v1
kind: Deployment
metadata:
  name: location-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: location-api
  template:
    metadata:
      labels:
        app: location-api
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: location-api
          image: "{{ .Values.location.image }}:{{ .Values.location.tag }}"
          imagePullPolicy: {{ .Values.location.pullPolicy }}

          ports:
            - containerPort: 3001

          readinessProbe:
            httpGet:
              path: /location
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /location
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          env:
            - name: REDIS_URL
              value: redis://redis:6379
            - name: MONGO_URI
              value: mongodb://appuser:apppassword@mongodb:27017/demo