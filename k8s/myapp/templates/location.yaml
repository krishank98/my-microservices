apiVersion: apps/v1
kind: Deployment
metadata:
  name: location-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: location-api
  template:
    metadata:
      labels:
        app: location-api
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: location-api
          image: "{{ .Values.location.image }}:{{ .Values.location.tag }}"
          imagePullPolicy: {{ .Values.location.pullPolicy }}
          ports:
            - containerPort: 3001

          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          env:
            - name: REDIS_URL
              value: redis://redis:6379
            - name: MONGO_URI
              value: mongodb://appuser:apppassword@mongodb:27017/demo

---
apiVersion: v1
kind: Service
metadata:
  name: location-api
spec:
  selector:
    app: location-api
  ports:
    - port: 3001
      targetPort: 3001