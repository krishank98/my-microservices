apiVersion: apps/v1
kind: Deployment
metadata:
  name: location-api
  namespace: my-micro-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: location-api
      tier: backend

  template:
    metadata:
      labels:
        app: location-api
        tier: backend

    spec:
      nodeSelector:
        cpu-node: "2cpu"

      tolerations:
        - key: "cpu-node"
          operator: "Equal"
          value: "2cpu"
          effect: "NoSchedule"

      imagePullSecrets:
        - name: ecr-secret

      containers:
        - name: location-api
          image: "{{ .Values.location.image }}:{{ .Values.location.tag }}"
          imagePullPolicy: {{ .Values.location.pullPolicy }}

          ports:
            - containerPort: 3001

          readinessProbe:
            httpGet:
              path: /location
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /location
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          env:
            - name: REDIS_URL
              value: redis://redis:6379
            - name: MONGO_URI
              value: mongodb://appuser:apppassword@mongodb:27017/demo

---
apiVersion: v1
kind: Service
metadata:
  name: location-api
  namespace: my-micro-dev
spec:
  type: ClusterIP
  selector:
    app: location-api
    tier: backend
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001